version: interpreter_v1

instructions: |
  Eres el intérprete de intenciones de Hermes (bot de WhatsApp para tiendas).
  Tu ÚNICA tarea es convertir el mensaje del usuario en JSON con:
  - intent: uno de sale, purchase, payment, inventory_query, report, unknown, clarify
  - entities: objeto con datos extraídos (pueden faltar campos)
  - confidence: número entre 0 y 1

  No inventes datos. Si el mensaje es ambiguo, usa intent=clarify o confidence baja.
  No ejecutes acciones ni redactes respuestas al usuario.
  Entiende español de LatAm (incluido voseo si el usuario lo usa), pero tu salida es solo JSON estructurado.

  Para ventas y compras con varios productos, usa entities.items como arreglo.
  Cada ítem puede incluir product_name, quantity, unit, unit_price.
  customer_name, supplier_name y payment_condition van a nivel raíz de entities cuando apliquen.

retry_user_template: |
  Reintenta. Responde SOLO JSON válido.
  Mensaje: %{message}

examples:
  - user: Vendí 10kg de arroz
    json:
      intent: sale
      entities:
        items:
          - quantity: 10
            product_name: arroz
            unit: kg
        quantity: 10
        product_name: arroz
        unit: kg
      confidence: 0.92

  - user: Vendí 10kg arroz y 5lt aceite a María al contado
    json:
      intent: sale
      entities:
        items:
          - quantity: 10
            product_name: arroz
            unit: kg
          - quantity: 5
            product_name: aceite
            unit: lt
        customer_name: María
        payment_condition: cash
      confidence: 0.9

  - user: Fiado a María 5kg arroz
    json:
      intent: sale
      entities:
        items:
          - quantity: 5
            product_name: arroz
            unit: kg
        customer_name: María
        payment_condition: credit
      confidence: 0.9

  - user: "Recibí de Juanito: arroz 50kg a $2000"
    json:
      intent: purchase
      entities:
        supplier_name: Juanito
        items:
          - product_name: arroz
            quantity: 50
            unit_price: 2000
        product_name: arroz
        quantity: 50
        unit_price: 2000
      confidence: 0.91

  - user: "Recibí de Juanito: arroz 50kg a $2000 y aceite 20lt a $6000"
    json:
      intent: purchase
      entities:
        supplier_name: Juanito
        items:
          - product_name: arroz
            quantity: 50
            unit_price: 2000
          - product_name: aceite
            quantity: 20
            unit_price: 6000
      confidence: 0.91

  - user: María pagó $10000
    json:
      intent: payment
      entities:
        customer_name: María
        amount: 10000
      confidence: 0.93

  - user: ¿Cuánto arroz me queda?
    json:
      intent: inventory_query
      entities:
        product_name: arroz
      confidence: 0.95

  - user: Reporte del día
    json:
      intent: report
      entities: {}
      confidence: 0.96

  - user: asdf
    json:
      intent: unknown
      entities: {}
      confidence: 0.2

schema:
  type: object
  additionalProperties: false
  properties:
    intent:
      type: string
      enum:
        - sale
        - purchase
        - payment
        - inventory_query
        - report
        - unknown
        - clarify
    entities:
      type: object
      additionalProperties: true
    confidence:
      type: number
      minimum: 0
      maximum: 1
  required:
    - intent
    - entities
    - confidence
