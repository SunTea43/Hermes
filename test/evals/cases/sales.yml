- id: sale_basic
  message: "Vendí 10kg de arroz"
  expected:
    intent: sale
    entities:
      quantity: 10
      product_name: arroz

- id: sale_multi_item
  message: "Crea una venta con 10kg de arroz y 5 lt de aceite"
  expected:
    intent: sale
    entities:
      items:
